site_name: Ethan Lee's Technical Blog
site_url: https://ethan-lee-goy.github.io/tech-blog/
repo_url: https://github.com/ethan-lee-goy/tech-blog

theme:
  name: material
  language: zh
  palette:
    scheme: default
    primary: indigo
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight

plugins:
  - search
  - mkdocs-jupyter:
      include_source: true

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - tables
  - pymdownx.highlight
  - pymdownx.superfences

extra_javascript:
  - https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16/dist/contrib/auto-render.min.js
  - javascripts/katex.js

extra_css:
  - https://cdn.jsdelivr.net/npm/katex@0.16/dist/katex.min.css

nav:
  - 首页: index.md
  - 深度学习:
    - 概述: deep-learning/README.md
    - CNN 基础入门: deep-learning/cnn_basics.md
  - 强化学习:
    - 概述: reinforcement-learning/README.md
    - 第1章 强化学习入门: reinforcement-learning/ch01_intro_to_rl.ipynb
  - 博弈算法:
    - 概述: game-theory/README.md
  - 车辆控制:
    - 概述: vehicle-control/README.md
  - 规划算法:
    - 概述: planning/README.md
  - 世界模型:
    - 概述: world-models/README.md
